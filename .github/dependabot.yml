# Dependabot version updates for morsebrowser_dev
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    target-branch: develop_kq4nkf
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps
      prefix-development: deps-dev
      include: scope
    labels:
      - dependencies
      - dependabot
    groups:
      # Bundles routine patch/minor bumps (majors still open one PR per package).
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      # Keeps security-driven npm bumps from flooding the repo with tiny PRs.
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    target-branch: develop_kq4nkf
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - dependabot
      - github-actions
    groups:
      github-actions:
        patterns:
          - "*"

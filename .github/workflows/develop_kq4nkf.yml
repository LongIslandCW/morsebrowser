# Build, test, and deploy develop_kq4nkf to GitHub Pages via Actions.
# Cloudflare Workers Builds continues independently via wrangler.jsonc.
#
# Repo Settings → Pages → Source must be "GitHub Actions" (not gh-pages branch).

name: CI develop_kq4nkf

on:
  push:
    branches: [develop_kq4nkf]
  pull_request:
    branches: [develop_kq4nkf]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20.x

      - run: npm ci

      - name: Generate lesson and preset manifests
        run: npm run prebuild

      - run: npm run test

      - run: npm run build --if-present

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: npm run test:e2e

      - name: Build for GitHub Pages
        run: |
          npm run build --if-present
          cp .nojekyll dist/.nojekyll
        env:
          GITHUB_PAGES: 'true'

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
